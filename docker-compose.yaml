version: "3.9"

services:
  traefik:
    image: traefik:v3.0
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:8000"
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  frontend:
    image: lector
    build:
      context: ./lector
      dockerfile: Dockerfile
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"

      # Frontend router: everything except /api
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  backend:
    image: tribune_logistica
    build:
      context: ./tribune_logistica
      dockerfile: Dockerfile
    volumes:
      # Persistent application data
      - ./tribune_logistica/data:/data
      - ./tribune_logistica/config:/config
    labels:
      - "traefik.enable=true"

      # Backend router: /api/*
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=web"

      # Strip /api before forwarding
      - "traefik.http.middlewares.backend-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.backend.middlewares=backend-strip"

      # Internal backend port
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
