
services:
  backend:
    image: lumilukko/tribune_logistica-staging:latest
    container_name: tribune_logistica-staging
    volumes:
      - /mnt/private/Serversetup/data/staging:/data
    environment:
      - TTS_BACKEND=http
      - LIBRARY_ROOT=/data
      - TTS_API_URL=http://booklegion-tribune_dictio:8000/tts
    env_file:
      - .env
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Router for backend
      - "traefik.http.routers.booklegion-backend.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.booklegion-backend.entrypoints=web"

      # Service port inside container
      - "traefik.http.services.booklegion-backend.loadbalancer.server.port=8000"
  onboarder:
    image: lumilukko/tribune_archivum-staging
    container_name: tribune_archivum-staging
    depends_on:
      - staging-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HARDCOVER_API_ENDPOINT=https://api.hardcover.app/v1/graphql
      - TRIBUNE_LOGISTICA_URL=http://tribune_logistica-staging:8000
      - RUST_LOG=debug
    volumes:
      - /mnt/private/Serversetup/data/staging:/data
      - /mnt/private/onboard-staging:/onboard
      - /mnt/private/onboard-staging-errors:/errs
    networks:
      - web

  frontend:
    image: lumilukko/lector-staging:latest
    container_name: lector-staging
    depends_on:
      - backend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=80" 

  traefik:
    image: traefik:latest
    container_name: traefik
    command:
      - "--api.insecure=true"              # Enable Traefik dashboard at :8081
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:8000"  # Expose HTTP on port 8000
    ports:
      - "8000:8000"   # Main HTTP port
      - "8081:8081"   # Dashboard (optional)
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    restart: unless-stopped